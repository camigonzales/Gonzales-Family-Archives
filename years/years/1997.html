<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1997 | The Gonzales Family Archives</title>

    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

<header class="year-header">
    <a href="/index.html" class="back-button">← Back to Archives</a>
    <h1>1997</h1>
</header>

<input type="text" id="search" class="search-bar" placeholder="Search photos (tags...)" />

<nav class="month-tabs">

    <button class="tab active" data-month="january">January</button>
    <button class="tab" data-month="february">February</button>
    <button class="tab" data-month="march">March</button>
    <button class="tab" data-month="april">April</button>
    <button class="tab" data-month="may">May</button>
    <button class="tab" data-month="june">June</button>
    <button class="tab" data-month="july">July</button>
    <button class="tab" data-month="august">August</button>
    <button class="tab" data-month="september">September</button>
    <button class="tab" data-month="october">October</button>
    <button class="tab" data-month="november">November</button>
    <button class="tab" data-month="december">December</button>

</nav>

<main>

    <!-- JANUARY -->
    <section class="month-panel active" id="january">
        <div class="photo-grid"></div>
    </section>

    <!-- FEBRUARY -->
    <section class="month-panel" id="february">
        <div class="photo-grid"></div>
    </section>

    <!-- MARCH -->
    <section class="month-panel" id="march">
        <div class="photo-grid"></div>
    </section>

    <!-- APRIL -->
    <section class="month-panel" id="april">
        <div class="photo-grid"></div>
    </section>

    <!-- MAY -->
    <section class="month-panel" id="may">
        <div class="photo-grid"></div>
    </section>

    <!-- JUNE -->
    <section class="month-panel" id="june">
        <div class="photo-grid"></div>
    </section>

    <!-- JULY -->
    <section class="month-panel" id="july">
        <div class="photo-grid"></div>
    </section>

    <!-- AUGUST -->
    <section class="month-panel" id="august">
        <div class="photo-grid"></div>
    </section>

    <!-- SEPTEMBER -->
    <section class="month-panel" id="september">
        <div class="photo-grid"></div>
    </section>

    <!-- OCTOBER -->
    <section class="month-panel" id="october">
        <div class="photo-grid"></div>
    </section>

    <!-- NOVEMBER -->
    <section class="month-panel" id="november">

   <div class="photo-grid">

    <div class="photo" data-tags="little lee birthday 1st birthday november">
        <img src="/photos/1997/11/1997-11-01.jpg">
        <p>Little Lee’s 1st Birthday</p>
    </div>

</div>

</section>

    <!-- DECEMBER -->
    <section class="month-panel" id="december">
        <div class="photo-grid"></div>
    </section>

</main>

<div id="lightbox" class="lightbox">

    <button class="lightbox-btn prev" id="prevBtn">‹</button>

    <div class="lightbox-content">
        <img id="lightbox-img" src="" alt="">
        <p id="lightbox-caption"></p>
    </div>

    <button class="lightbox-btn next" id="nextBtn">›</button>

</div>


<script src="/js/main.js"></script>
</body>
</html>
